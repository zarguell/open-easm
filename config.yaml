targets:
  - id: google
    name: Google
    type: organization
    enabled: true
    labels:
      env: external
      owner: security
      criticality: high
    match_rules:
      domains:
        - google.com
        - googleapis.com
        - googlecloud.com
        - google-analytics.com
        - googletagmanager.com
      keywords:
        - Google LLC
        - Google Cloud
      asns:
        - AS15169
    runners:
      certstream:
        enabled: true
        mode: realtime
        filters:
          include_common_name: true
          include_san_dns_names: true
          match_mode: suffix
      subfinder:
        enabled: true
        schedule: "0 */6 * * *"
        args:
          passive_only: true
          recursive: true
          timeout_seconds: 60
      asnmap:
        enabled: true
        schedule: "0 2 * * *"
        args:
          expand_org_names: true
          timeout_seconds: 60
    pivot:
      enabled: true
      max_depth: 2
      max_concurrent: 3
      batch_interval_ms: 200
      scope_mode: strict
      allowed_pivots:
        - from: ip_range
          to: ip
          via: reverse_dns
          cooldown_hours: 24
        - from: hostname
          to: ip
          via: dns_resolve
          cooldown_hours: 24
        - from: hostname
          to: domain
          via: domain_extract
          cooldown_hours: 24
        - from: domain
          to: domain
          via: dns_mail_records
          cooldown_hours: 24
        - from: hostname
          to: certificate
          via: tls_cert_grab
          cooldown_hours: 24
        - from: domain
          to: domain
          via: domain_rdap
          cooldown_hours: 168
        - from: ip
          to: ip
          via: geoip_enrich
          cooldown_hours: 168

  - id: netnod
    name: Netnod
    type: organization
    enabled: true
    labels:
      env: external
      owner: security
      criticality: high
    match_rules:
        asns:
          - AS50563
    runners:
      asnmap:
        enabled: true
        schedule: "0 2 * * *"
        args:
          expand_org_names: true
          timeout_seconds: 60
      certstream:
        enabled: false
        mode: realtime
        filters:
          include_common_name: true
          include_san_dns_names: true
          match_mode: suffix
    pivot:
      enabled: true
      max_depth: 2
      max_concurrent: 3
      batch_interval_ms: 200
      scope_mode: strict
      allowed_pivots:
        - from: ip_range
          to: ip
          via: reverse_dns
          cooldown_hours: 24
        - from: hostname
          to: ip
          via: dns_resolve
          cooldown_hours: 24
        - from: hostname
          to: domain
          via: domain_extract
          cooldown_hours: 24
        - from: domain
          to: domain
          via: dns_mail_records
          cooldown_hours: 24
        - from: hostname
          to: certificate
          via: tls_cert_grab
          cooldown_hours: 24
        - from: domain
          to: domain
          via: domain_rdap
          cooldown_hours: 168
        - from: ip
          to: ip
          via: geoip_enrich
          cooldown_hours: 168
