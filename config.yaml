targets:
  - id: google
    name: Google
    type: organization
    enabled: true
    labels:
      env: external
      owner: security
      criticality: high
    match_rules:
      domains:
        - google.com
      keywords:
        - Google
      asns:
        - AS15169
    runners:
      certstream:
        enabled: true
        mode: realtime
        filters:
          include_common_name: true
          include_san_dns_names: true
          match_mode: suffix
      subfinder:
        enabled: true
        schedule: "0 */6 * * *"
        args:
          passive_only: true
          recursive: true
          timeout_seconds: 60
      asnmap:
        enabled: true
        schedule: "0 2 * * *"
        args:
          expand_org_names: true
          timeout_seconds: 60
