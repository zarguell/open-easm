id: subdomain_takeover_risk
meta:
  name: "Subdomain takeover risk"
  risk: high
  description: >
    A hostname was found with signs of a potential subdomain takeover.
    DNS, provider, and HTTP signals are evaluated to determine severity
    and confidence. See docs/takeover-detection.md for the full model.
collect:
  - method: exact
    field: entity_type
    value: hostname
  - method: regex
    field: attributes.takeover_risk
    patterns:
      - "[Tt]rue"
aggregation:
  field: entity_value
analysis:
  - method: threshold
    field: entity_value
    minimum: 1
headline: "Takeover signals on {entity_value} ({signal_count} signals)"
