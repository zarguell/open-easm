id: high_risk_port_exposed
meta:
  name: "High-risk port exposed to the internet"
  risk: high
  description: >
    A host was found with a high-risk port open (RDP 3389,
    Telnet 23, MySQL 3306, PostgreSQL 5432, Redis 6379,
    Elasticsearch 9200, or Memcached 11211).
collect:
  - method: exact
    field: entity_type
    value: ip
  - method: regex
    field: attributes.open_ports
    patterns:
      - '"port": 3389'
      - '"port": 23'
      - '"port": 3306'
      - '"port": 5432'
      - '"port": 6379'
      - '"port": 9200'
      - '"port": 11211'
aggregation:
  field: entity_value
headline: "High-risk port exposed: {entity_value}"
