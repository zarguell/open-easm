id: outlier_country
meta:
  name: "Asset hosted in unexpected country"
  risk: medium
  description: >
    An asset was found hosted in a country not typically associated with
    the organization's infrastructure.
collect:
  - method: exact
    field: entity_type
    value: ip
  - method: regex
    field: attributes.geo.country_code
    patterns:
      - ".+"
  - method: not_regex
    field: attributes.geo.country_code
    patterns:
      - "^US$"
      - "^CA$"
      - "^GB$"
aggregation:
  field: entity_value
headline: "IP in potentially unexpected location: {entity_value}"
