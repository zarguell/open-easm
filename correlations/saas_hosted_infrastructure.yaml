id: saas_hosted_infrastructure
meta:
  name: "Hostname served via SaaS provider"
  risk: low
  description: >
    A hostname was found with a CNAME record pointing to a SaaS provider
    (e.g., GitHub Pages, AWS S3, Netlify, Heroku, Cloudflare). This
    indicates the hostname is hosted on third-party infrastructure rather
    than self-hosted.
collect:
  - method: exact
    field: entity_type
    value: hostname
  - method: regex
    field: attributes.cname_target
    patterns:
      - ".+"
aggregation:
  field: entity_value
headline: "SaaS-hosted infrastructure: {entity_value} -> {cname_target}"
