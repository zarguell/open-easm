services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easm}
      POSTGRES_USER: ${POSTGRES_USER:-easm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easm}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      target: web
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      EASM_MODE: web
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      EASM_MODE: worker
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-1}

volumes:
  postgres_data:
